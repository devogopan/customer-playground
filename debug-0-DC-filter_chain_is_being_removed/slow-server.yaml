---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slow-server-script
  namespace: httpbin
data:
  server.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import time, json

    class Handler(BaseHTTPRequestHandler):
      def do_GET(self):
        parts = self.path.strip("/").split("/")
        secs = int(parts[-1]) if parts and parts[-1].isdigit() else 30
        print(f"sleeping {secs}s ...", flush=True)
        time.sleep(secs)
        body = json.dumps({"slept": secs}).encode()
        self.send_response(200)
        self.send_header("Content-Type", "application/json")
        self.end_headers()
        self.wfile.write(body)

      def log_message(self, fmt, *args):
        print(fmt % args, flush=True)

    print("Slow server on :8080", flush=True)
    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-service
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-service
  template:
    metadata:
      labels:
        app: slow-service
    spec:
      containers:
      - name: server
        image: python:3.11-slim
        command: ["python", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: script
          mountPath: /app
      volumes:
      - name: script
        configMap:
          name: slow-server-script
---
apiVersion: v1
kind: Service
metadata:
  name: slow-service
  namespace: httpbin
spec:
  selector:
    app: slow-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
