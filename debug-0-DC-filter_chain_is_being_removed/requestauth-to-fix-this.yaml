apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-auth
  namespace: httpbin
spec:
  selector:
    matchLabels:
      app: httpbin
  jwtRules:
  - issuer: "test-issuer"
    jwksUri: "http://jwks-server.httpbin.svc.cluster.local/.well-known/jwks.json"
    forwardOriginalToken: true
