apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: ratelimit-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      annotations:
        proxy.istio.io/config: |
          proxyMetadata:
            ISTIO_DELTA_XDS: "false"
      labels:
        app: httpbin
    spec:
      containers:
      - name: httpbin
        image: kennethreitz/httpbin:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: ratelimit-demo
spec:
  selector:
    app: httpbin
  ports:
  - port: 80
    targetPort: 80
    name: http

